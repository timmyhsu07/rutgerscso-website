<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Space Mono', ui-monospace, monospace">
  <!-- Bold postal placeholder: grid paper, flat outlined shapes, pagoda mark -->
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0v34" fill="none" stroke="#2e2a22" stroke-opacity=".1" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2.5" cy="2.5" r="2" fill="#7d9fd6"/>
    </pattern>
  </defs>
  <rect width="640" height="400" fill="#f2ead6"/>
  <rect width="640" height="400" fill="url(#grid)"/>
  <!-- bold flat shapes -->
  <path d="M472 46h96a44 44 0 0 1 44 44v52a12 12 0 0 1-12 12h-96a44 44 0 0 1-44-44V58a12 12 0 0 1 12-12Z" fill="#92b4e6" stroke="#2e2a22" stroke-width="3.5"/>
  <circle cx="104" cy="86" r="46" fill="url(#dots)" stroke="#2e2a22" stroke-width="3.5"/>
  <path d="M40 306a52 52 0 0 1 52-52h60a12 12 0 0 1 12 12v52a40 40 0 0 1-40 40H52a12 12 0 0 1-12-12Z" fill="url(#dots)" stroke="#2e2a22" stroke-width="3.5"/>
  <circle cx="560" cy="330" r="34" fill="#c14038" stroke="#2e2a22" stroke-width="3.5"/>
  <!-- pagoda mark -->
  <g transform="translate(268,66) scale(1.05)" fill="#2e2a22">
    <rect x="49" y="0" width="4" height="9"/>
    <path d="M36 18h30l-8-9H44Z"/>
    <rect x="43" y="18" width="16" height="10"/>
    <path d="M31 39h40l-8-11H39Z"/>
    <rect x="40" y="39" width="22" height="12"/>
    <path d="M25 62h52l-9-11H34Z"/>
    <rect x="36" y="62" width="30" height="18"/>
  </g>
  <rect x="14" y="14" width="612" height="372" fill="none" stroke="#2e2a22" stroke-width="4"/>
  <text x="320" y="258" text-anchor="middle" font-size="21" letter-spacing="7" fill="#2e2a22" font-weight="700">IMAGE COMING SOON</text>
  <text x="320" y="288" text-anchor="middle" font-size="13" letter-spacing="4" fill="#5e5748">RUTGERS · 中国学生会</text>
  <!-- barcode -->
  <g fill="#2e2a22" transform="translate(272,318)">
    <rect width="5" height="24"/><rect x="8" width="2" height="24"/><rect x="13" width="4" height="24"/>
    <rect x="20" width="2" height="24"/><rect x="25" width="5" height="24"/><rect x="33" width="3" height="24"/>
    <rect x="39" width="2" height="24"/><rect x="44" width="4" height="24"/><rect x="51" width="2" height="24"/>
    <rect x="56" width="5" height="24"/><rect x="64" width="2" height="24"/><rect x="69" width="3" height="24"/>
    <rect x="75" width="5" height="24"/><rect x="83" width="2" height="24"/><rect x="88" width="4" height="24"/>
  </g>
</svg>
